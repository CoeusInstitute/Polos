name: validate-mesh

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Structural integrity (no-gaps invariants)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r tools/requirements.txt
      - name: Validate the mesh
        run: python tools/validate_mesh.py
